name: Publish dev apt repository

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache: true

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev apt-utils gnupg

      - name: Test
        run: go test ./...

      - name: Build Debian packages
        run: |
          set -eu
          VERSION="0.1.0~dev.${GITHUB_RUN_NUMBER}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          mkdir -p dist/deb
          scripts/build-deb.sh "$VERSION" amd64 dist/deb
          scripts/build-deb.sh "$VERSION" arm64 dist/deb

      - name: Build apt repository
        run: |
          set -eu
          mkdir -p public/apt/pool/main/m/meerkat-agent
          mkdir -p public/apt/dists/stable/main/binary-amd64
          mkdir -p public/apt/dists/stable/main/binary-arm64
          cp dist/deb/*.deb public/apt/pool/main/m/meerkat-agent/

          cd public/apt
          dpkg-scanpackages --arch amd64 pool > dists/stable/main/binary-amd64/Packages
          gzip -k -f dists/stable/main/binary-amd64/Packages
          dpkg-scanpackages --arch arm64 pool > dists/stable/main/binary-arm64/Packages
          gzip -k -f dists/stable/main/binary-arm64/Packages

          apt-ftparchive release dists/stable > dists/stable/Release

      - name: Sign apt repository
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          APT_GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
        run: |
          set -eu
          export GNUPGHOME="$RUNNER_TEMP/gnupg"
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"

          if [ -n "${APT_GPG_PRIVATE_KEY:-}" ]; then
            printf '%s' "$APT_GPG_PRIVATE_KEY" | gpg --batch --import
          else
            {
              printf '%s\n' '%no-protection'
              printf '%s\n' 'Key-Type: eddsa'
              printf '%s\n' 'Key-Curve: ed25519'
              printf '%s\n' 'Key-Usage: sign'
              printf '%s\n' 'Name-Real: Meerkat Agent Dev Apt'
              printf '%s\n' 'Name-Email: meerkat-agent-dev@tnisoft.ro'
              printf '%s\n' 'Expire-Date: 30d'
              printf '%s\n' '%commit'
            } > "$RUNNER_TEMP/gpg-batch"
            gpg --batch --generate-key "$RUNNER_TEMP/gpg-batch"
            echo "::warning::Using an ephemeral dev apt signing key. Installers must refresh apt/key.gpg after each repository publication until APT_GPG_PRIVATE_KEY is configured."
          fi

          KEY_ID="$(gpg --batch --list-secret-keys --with-colons | awk -F: '/^sec:/ {print $5; exit}')"
          gpg --batch --yes --armor --export "$KEY_ID" > public/apt/key.gpg

          SIGN_ARGS=""
          if [ -n "${APT_GPG_PASSPHRASE:-}" ]; then
            SIGN_ARGS="--pinentry-mode loopback --passphrase $APT_GPG_PASSPHRASE"
          fi

          cd public/apt/dists/stable
          gpg --batch --yes $SIGN_ARGS --local-user "$KEY_ID" --armor --detach-sign -o Release.gpg Release
          gpg --batch --yes $SIGN_ARGS --local-user "$KEY_ID" --clearsign -o InRelease Release

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
