name: Publish apt repository

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache: true

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev apt-utils gnupg

      - name: Test
        run: go test ./...

      - name: Build Debian packages
        run: |
          set -eu
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.1.0~dev.${GITHUB_RUN_NUMBER}+${GITHUB_SHA::7}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          mkdir -p dist/deb
          scripts/build-deb.sh "$VERSION" amd64 dist/deb
          scripts/build-deb.sh "$VERSION" arm64 dist/deb

      - name: Build apt repository
        run: |
          set -eu
          mkdir -p public/apt/pool/main/m/meerkat-agent
          mkdir -p public/apt/dists/stable/main/binary-amd64
          mkdir -p public/apt/dists/stable/main/binary-arm64
          cp dist/deb/*.deb public/apt/pool/main/m/meerkat-agent/

          cd public/apt
          dpkg-scanpackages --arch amd64 pool > dists/stable/main/binary-amd64/Packages
          gzip -k -f dists/stable/main/binary-amd64/Packages
          dpkg-scanpackages --arch arm64 pool > dists/stable/main/binary-arm64/Packages
          gzip -k -f dists/stable/main/binary-arm64/Packages

          {
            printf '%s\n' 'Origin: Meerkat'
            printf '%s\n' 'Label: Meerkat Agent'
            printf '%s\n' 'Suite: stable'
            printf '%s\n' 'Codename: stable'
            printf '%s\n' 'Architectures: amd64 arm64'
            printf '%s\n' 'Components: main'
            apt-ftparchive release dists/stable
          } > dists/stable/Release

      - name: Sign apt repository
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          APT_GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
        run: |
          set -eu
          export GNUPGHOME="$RUNNER_TEMP/gnupg"
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"

          if [ -z "${APT_GPG_PRIVATE_KEY:-}" ]; then
            echo "::error::APT_GPG_PRIVATE_KEY is required. Configure the permanent Meerkat apt signing key before publishing."
            exit 1
          fi

          printf '%s' "$APT_GPG_PRIVATE_KEY" | gpg --batch --import

          KEY_ID="$(gpg --batch --list-secret-keys --with-colons | awk -F: '/^sec:/ {print $5; exit}')"
          if [ -z "$KEY_ID" ]; then
            echo "::error::APT_GPG_PRIVATE_KEY did not import a usable secret key."
            exit 1
          fi

          gpg --batch --yes --armor --export "$KEY_ID" > public/apt/key.gpg

          SIGN_ARGS=()
          if [ -n "${APT_GPG_PASSPHRASE:-}" ]; then
            PASSPHRASE_FILE="$RUNNER_TEMP/gpg-passphrase"
            printf '%s' "$APT_GPG_PASSPHRASE" > "$PASSPHRASE_FILE"
            chmod 600 "$PASSPHRASE_FILE"
            SIGN_ARGS=(--pinentry-mode loopback --passphrase-file "$PASSPHRASE_FILE")
          fi

          cd public/apt/dists/stable
          gpg --batch --yes "${SIGN_ARGS[@]}" --local-user "$KEY_ID" --armor --detach-sign -o Release.gpg Release
          gpg --batch --yes "${SIGN_ARGS[@]}" --local-user "$KEY_ID" --clearsign -o InRelease Release

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
